    .logo-svg { height: 48px; width:auto; display:block; }

    .scene { width:100vw; height:100vh; scroll-snap-align:start; display:flex; align-items:center; justify-content:center; flex-direction:column; padding:0; text-align:center; gap: 12px; }
    .typewriter-line { display:flex; align-items:center; gap:0.04em; }
    .typewriter-text { font-family:'Inter',sans-serif; font-size: clamp(48px, 10vw, 140px); font-weight:700; color:#b10702; letter-spacing:-0.03em; white-space:nowrap; line-height:1; }
    .text-cursor { display:inline-block; height:7em; width:calc(7em*(100/125)); margin-left:0.05em; vertical-align:middle; animation: cursorBlink 0.9s step-start infinite; }
    .text-cursor path { fill: #b10702; }
    @keyframes cursorBlink { 0%,100%{opacity:1}50%{opacity:0} }

    /* scroll button removed */
    .logo-wordmark { max-width: 980px; width: 72%; }
    .logo-wordmark svg { width: 100%; height: auto; display: block; }

    .clients-section { width:100vw; height:100vh; scroll-snap-align:start; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:52px; border-top:1px solid rgba(0,0,0,0.07); }
    .clients-label{font-size:11px;font-weight:500;letter-spacing:0.22em;text-transform:uppercase;color:rgba(0,0,0,0.35)}
    .marquee-wrapper{width:100%;overflow:hidden;-webkit-mask-image:linear-gradient(to right, transparent 0%, black 12%, black 88%, transparent 100%);mask-image:linear-gradient(to right, transparent 0%, black 12%, black 88%, transparent 100%)}
    .marquee-track{display:flex;align-items:center;gap:72px;width:max-content;animation:marqueeScroll 35s linear infinite}
    .marquee-item{display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:0.95;transition:transform 220ms cubic-bezier(.2,.9,.2,1),opacity 180ms ease;will-change:transform,opacity;transform-origin:center;cursor:pointer}
    .marquee-item:hover{opacity:1;transform:scale(1.08)}
    .marquee-item svg{height:120px;width:auto;display:block;transition:transform 220ms cubic-bezier(.2,.9,.2,1),filter 180ms ease;filter:brightness(1.06) saturate(1.08) contrast(1.03)}
    @keyframes marqueeScroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  </style>

  <script>
  // Typewriter for Cases title + description
  (function(){
    const headingEl = document.getElementById('tw');
    const descEl = document.getElementById('tw-desc');
    const heading = 'Cases';
    const desc = 'Selected case studies — outcomes, process, and results from our work.';

    function typeText(el, text, delay = 50){
      return new Promise(resolve => {
        el.textContent = '';
        let i = 0;
        const t = setInterval(() => {
          el.textContent += text.charAt(i);
          i++;
          if(i >= text.length){ clearInterval(t); resolve(); }
        }, delay);
      });
    }

    // Heading with erase-and-type loop, description types once after first full heading
    (function(){
      const el = document.getElementById('tw');
      const descEl = document.getElementById('tw-desc');
      const words = ['Cases'];
      const TYPE_SPEED = 80;
      const DELETE_SPEED = 40;
      const PAUSE_BEFORE = 120;
      let wi = 0, ci = 0, deleting = false;
      let firstDone = false;

      function pauseAfter(word){
        const slot = 3000;
        const used = word.length * TYPE_SPEED + word.length * DELETE_SPEED + PAUSE_BEFORE;
        return Math.max(300, slot - used);
      }

      async function tick(){
        const word = words[wi];
        if(!deleting){
          el.textContent = word.slice(0, ++ci);
          if(ci === word.length){
            // on first full show, type description once
            if(!firstDone){ firstDone = true; descEl.setAttribute('aria-hidden','false'); typeText(descEl, desc, 18); }
            deleting = true; setTimeout(tick, pauseAfter(word)); return;
          }
          setTimeout(tick, TYPE_SPEED);
        } else {
          el.textContent = word.slice(0, --ci);
          if(ci === 0){ deleting = false; wi = (wi + 1) % words.length; setTimeout(tick, PAUSE_BEFORE); return; }
          setTimeout(tick, DELETE_SPEED);
        }
      }

      document.addEventListener('DOMContentLoaded', () => {
        const cursor = document.querySelector('.text-cursor'); if(cursor) cursor.style.display = 'inline-block';
        tick();
      });
    })();

  // Duplicate marquee items for smooth loop
  (function(){
    const track = document.getElementById('marqueeTrack');
    if(track && track.children.length && !track.dataset.duplicated){ track.innerHTML = track.innerHTML + track.innerHTML; track.dataset.duplicated = 'true'; }
  })();

  // Make marquee click open cases (already on this page) — no-op here, but keep pointer
  (function(){ const track = document.getElementById('marqueeTrack'); if(track) Array.from(track.querySelectorAll('.marquee-item')).forEach(it => it.style.cursor = 'pointer'); })();
  </script>
