<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Helper Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #fff;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
    }

    /* ── Nav ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 clamp(24px, 5vw, 72px);
      height: 80px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(0,0,0,0.07);
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: clamp(24px, 3vw, 52px);
      flex: 1;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: clamp(24px, 3vw, 48px);
      flex: 1;
      justify-content: flex-end;
    }

    .nav-link {
      font-family: 'Inter', sans-serif;
      font-size: clamp(12px, 1vw, 15px);
      font-weight: 700;
      color: rgba(0,0,0,0.5);
      text-decoration: none;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      transition: color 0.2s ease;
      white-space: nowrap;
    }
    .nav-link:hover {
      color: #b10702;
    }

    /* Center Logo */
    .nav-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      flex-shrink: 0;
      padding: 0 clamp(12px, 2vw, 32px);
    }

    .logo-svg {
      height: 48px;
      width: auto;
      display: block;
      overflow: visible;
    }

    /* Connect button */
    .nav-btn {
      font-family: 'Inter', sans-serif;
      font-size: clamp(12px, 1vw, 15px);
      font-weight: 700;
      color: rgba(0,0,0,0.5);
      background: none;
      border: none;
      padding: 0;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.2s ease;
      white-space: nowrap;
    }
    .nav-btn:hover {
      color: #b10702;
    }

    /* ── Hero ── */
    .scene {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding-left: 6vw;
      padding-top: 80px;
    }

    .typewriter-line {
      display: flex;
      align-items: center;
      gap: 0.04em;
      line-height: 1;
    }

    .typewriter-text {
      font-family: 'Inter', sans-serif;
      font-size: clamp(60px, 13vw, 200px);
      font-weight: 700;
      color: #b10702;
      letter-spacing: -0.03em;
      white-space: nowrap;
      line-height: 1;
    }

    /* SVG text cursor */
    .text-cursor {
      display: inline-block;
      height: 7em;
      width: calc(7em * (100 / 125));
      margin-left: 0.05em;
      vertical-align: middle;
      animation: cursorBlink 0.9s step-start infinite;
      flex-shrink: 0;
    }

    .text-cursor path {
      fill: #b10702;
    }

    @keyframes cursorBlink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ── Scroll button ── */
    .scroll-btn {
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
    }

    .scroll-btn-pill {
      width: 36px;
      height: 58px;
      border: 1.5px solid #b10702;
      border-radius: 999px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 9px;
      transition: border-color 0.2s ease;
    }

    .scroll-btn:hover .scroll-btn-pill {
      border-color: #8a0501;
    }

    .scroll-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #b10702;
      animation: scrollDot 1.6s cubic-bezier(0.45, 0, 0.55, 1) infinite;
    }

    .scroll-btn:hover .scroll-dot {
      background: #8a0501;
    }

    @keyframes scrollDot {
      0%   { opacity: 1; transform: translateY(0); }
      80%  { opacity: 0; transform: translateY(22px); }
      100% { opacity: 0; transform: translateY(22px); }
    }

    .scroll-label {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #b10702;
      transition: color 0.2s ease;
    }

    .scroll-btn:hover .scroll-label {
      color: #8a0501;
    }
  </style>
</head>
<body>


  <nav>
    <div class="nav-left">
      <a href="services.html" class="nav-link" id="nav-services">Services</a>
      <a href="#" class="nav-link">Cases</a>
    </div>

    <a href="index.html" class="nav-logo" aria-label="The Helper Studio">

        </defs>
        <text class="logo-text" font-size="301.42" transform="translate(518.89 290.35)"><tspan x="0" y="0">The Helper</tspan><tspan x="0" y="233.15">Studio</tspan></text>
        <text class="logo-text" font-size="39.35" transform="translate(1480 97.52)"><tspan x="0" y="0">TM</tspan></text>
        <path class="logo-mark" d="M341.46,376.97l-176.31,115.22,45.46,108.1c-57.23-22.79-76.93-65.04-95.99-119.98l186.2-118.37c4.58-18.96-6.81-120.23-13.94-141.03-7.03-20.51-129.92-185.95-79.13-196.89,13.13,1.27,19.34,18.41,25.73,28.17,19.12,29.18,87.78,137.51,94.43,163.7,4.21,16.58,17.61,154.1,13.54,161.08Z"/>
        <path class="logo-mark" d="M81.69,0l155.45,186.61c15.13,40.34,47.59,93.55,12.55,131.41-7.1.07-40.29-98.48-48.71-113.25C176.27,161.43,69.55,62.81,72.06,20.96c.55-9.23,1.38-15.47,9.63-20.96Z"/>
        <path class="logo-mark" d="M198.58,342.12c-9.47,8.74-10.27-2.92-13.37-7.71-19.53-30.24-30.7-73.69-52.59-103.31C98.18,184.5,16.61,157.49,24.6,90.04c11.04-1.41,18.8,6.23,26.88,12.08,20.9,15.11,105.7,94.53,119.78,114.34,16.5,23.2,50.88,103.89,27.3,125.67Z"/>

        <path class="logo-mark" d="M94.6,236.09c8.42,8.33,50.38,71.29,53.22,81.83,4.42,16.4,8.31,42.01-6.19,54.12-7.61-.08-59.05-88.21-71.91-102.06C44.66,242.97-5.04,232.31.42,189.09c.79-6.24-1.32-13.03,9.05-8.97,4.74,1.86,81.51,52.38,85.14,55.96Z"/>

    </a>

    <div class="nav-right">
      <a href="#" class="nav-link">About</a>
      <button class="nav-btn">Connect</button>
    </div>
  </nav>

  <div class="scene">
    <div class="typewriter-line">
      <span class="typewriter-text" id="tw"></span>
      <svg class="text-cursor" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 125">
        <path d="M51.2,15.4c0-6.6,0-10.2,12.5-10.2h6.2v-2.5h-6.2c-8.4,0-12.1,1.9-13.7,4.7-1.6-2.9-5.3-4.7-13.7-4.7h-6.2v2.5h6.2c12.5,0,12.5,3.6,12.5,10.2v45.9h-7v2.5h7v44.8c0,6.6,0,11.3-12.5,11.3h-6.2v2.5h6.2c8.4,0,12.1-2.2,13.7-5.4,1.6,3.2,5.3,5.4,13.7,5.4h6.2v-2.5h-6.2c-12.5,0-12.5-4.7-12.5-11.3v-44.8h7v-2.5h-7V15.4Z"/>
      </svg>
    </div>
  </div>

  <button class="scroll-btn" onclick="window.location.href='services.html'">
    <div class="scroll-btn-pill">
      <div class="scroll-dot"></div>
    </div>
    <span class="scroll-label">Scroll</span>
  </button>

  <script>
    /* ── Typewriter ── */
    const TOTAL_MS     = 6000;
    const words        = ['Led.', 'Inspired.', 'Delivered.'];
    const TYPE_SPEED   = 55;
    const DELETE_SPEED = 35;
    const PAUSE_BEFORE = 80;
    const el = document.getElementById('tw');
    let wi = 0, ci = 0, deleting = false;

    function pauseAfter(word) {
      const slot = TOTAL_MS / words.length;
      const used = word.length * TYPE_SPEED + word.length * DELETE_SPEED + PAUSE_BEFORE;
      return Math.max(200, slot - used);
    }

    function tick() {
      const word = words[wi];
      if (!deleting) {
        el.textContent = word.slice(0, ++ci);
        if (ci === word.length) { deleting = true; setTimeout(tick, pauseAfter(word)); return; }
        setTimeout(tick, TYPE_SPEED);
      } else {
        el.textContent = word.slice(0, --ci);
        if (ci === 0) { deleting = false; wi = (wi + 1) % words.length; setTimeout(tick, PAUSE_BEFORE); return; }
        setTimeout(tick, DELETE_SPEED);
      }
    }
    tick();
  </script>
</body>
</html>
