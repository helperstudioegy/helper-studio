<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Helper Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      width: 100%; height: 100%;
      scroll-snap-type: y mandatory;
      overflow-y: scroll;
      overflow-x: hidden;
    }

    body {
      width: 100%; min-height: 100%;
      background: #fff;
      font-family: 'Inter', sans-serif;
    }

    /* ── Nav ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 clamp(24px, 5vw, 72px);
      height: 80px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(0,0,0,0.07);
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: clamp(24px, 3vw, 52px);
      flex: 1;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: clamp(24px, 3vw, 48px);
      flex: 1;
      justify-content: flex-end;
    }

    .nav-link {
      font-family: 'Inter', sans-serif;
      font-size: clamp(12px, 1vw, 15px);
      font-weight: 700;
      color: rgba(0,0,0,0.5);
      text-decoration: none;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      transition: color 0.2s ease;
      white-space: nowrap;
    }
    .nav-link:hover {
      color: #b10702;
    }

    /* Center Logo */
    .nav-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      flex-shrink: 0;
      padding: 0 clamp(12px, 2vw, 32px);
    }

    .logo-svg {
      height: 48px;
      width: auto;
      display: block;
      overflow: visible;
    }

    /* Connect button */
    .nav-btn {
      font-family: 'Inter', sans-serif;
      font-size: clamp(12px, 1vw, 15px);
      font-weight: 700;
      color: rgba(0,0,0,0.5);
      background: none;
      border: none;
      padding: 0;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.2s ease;
      white-space: nowrap;
    }
    .nav-btn:hover {
      color: #b10702;
    }

    /* ── Hero ── */
    .scene {
      width: 100vw;
      height: 100vh;
      scroll-snap-align: start;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding-left: 6vw;
      padding-top: 80px;
    }

    .typewriter-line {
      display: flex;
      align-items: center;
      gap: 0.04em;
      line-height: 1;
    }

    .typewriter-text {
      font-family: 'Inter', sans-serif;
      font-size: clamp(60px, 13vw, 200px);
      font-weight: 700;
      color: #b10702;
      letter-spacing: -0.03em;
      white-space: nowrap;
      line-height: 1;
    }

    /* SVG text cursor */
    .text-cursor {
      display: inline-block;
      height: 7em;
      width: calc(7em * (100 / 125));
      margin-left: 0.05em;
      vertical-align: middle;
      animation: cursorBlink 0.9s step-start infinite;
      flex-shrink: 0;
    }

    .text-cursor path {
      fill: #b10702;
    }

    @keyframes cursorBlink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ── Scroll button ── */
    .scroll-btn {
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
    }

    .scroll-btn-pill {
      width: 36px;
      height: 58px;
      border: 1.5px solid #b10702;
      border-radius: 999px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 9px;
      transition: border-color 0.2s ease;
    }

    .scroll-btn:hover .scroll-btn-pill {
      border-color: #8a0501;
    }

    .scroll-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #b10702;
      animation: scrollDot 1.6s cubic-bezier(0.45, 0, 0.55, 1) infinite;
    }

    .scroll-btn:hover .scroll-dot {
      background: #8a0501;
    }

    @keyframes scrollDot {
      0%   { opacity: 1; transform: translateY(0); }
      80%  { opacity: 0; transform: translateY(22px); }
      100% { opacity: 0; transform: translateY(22px); }
    }

    .scroll-label {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #b10702;
      transition: color 0.2s ease;
    }

    .scroll-btn:hover .scroll-label {
      color: #8a0501;
    }

    /* ── Clients Section ── */
    .clients-section {
      width: 100vw;
      height: 100vh;
      scroll-snap-align: start;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      border-top: 1px solid rgba(0,0,0,0.07);
      overflow: hidden;
      gap: 52px;
    }

    .clients-label {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.35);
      text-align: center;
      flex-shrink: 0;
    }

    /* Marquee track */
    .marquee-wrapper {
      width: 100%;
      overflow: hidden;
      -webkit-mask-image: linear-gradient(to right, transparent 0%, black 12%, black 88%, transparent 100%);
      mask-image: linear-gradient(to right, transparent 0%, black 12%, black 88%, transparent 100%);
    }

    .marquee-track {
      display: flex;
      align-items: center;
      gap: 72px;
      width: max-content;
      animation: marqueeScroll 35s linear infinite;
    }

    .marquee-track:hover {
      animation-play-state: paused;
    }

    .marquee-item {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      opacity: 0.6;
      transition: opacity 0.3s ease;
    }

    .marquee-item:hover {
      opacity: 1;
    }

    /* Vector SVG logos */
    .marquee-item svg {
      height: 80px;
      width: auto;
      display: block;
      overflow: visible;
    }

    .marquee-item {
      line-height: 0;
    }

    /* Raster PNG logos — multiply kills black backgrounds */
    .marquee-item--raster img {
      height: 80px;
      width: auto;
      display: block;
      
    }

    @keyframes marqueeScroll {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }
  </style>
</head>

  <script>
    /* ── Typewriter ── */
    const TOTAL_MS     = 6000;
    const words        = ['Led.', 'Inspired.', 'Delivered.'];
    const TYPE_SPEED   = 55;
    const DELETE_SPEED = 35;
    const PAUSE_BEFORE = 80;
    const el = document.getElementById('tw');
    let wi = 0, ci = 0, deleting = false;

    function pauseAfter(word) {
      const slot = TOTAL_MS / words.length;
      const used = word.length * TYPE_SPEED + word.length * DELETE_SPEED + PAUSE_BEFORE;
      return Math.max(200, slot - used);
    }

    function tick() {
      const word = words[wi];
      if (!deleting) {
        el.textContent = word.slice(0, ++ci);
        if (ci === word.length) { deleting = true; setTimeout(tick, pauseAfter(word)); return; }
        setTimeout(tick, TYPE_SPEED);
      } else {
        el.textContent = word.slice(0, --ci);
        if (ci === 0) { deleting = false; wi = (wi + 1) % words.length; setTimeout(tick, PAUSE_BEFORE); return; }
        setTimeout(tick, DELETE_SPEED);
      }
    }
    tick();
  </script>
