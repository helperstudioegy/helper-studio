    html, body {

    /* ── Nav ── */

      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      height: 64px;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(0,0,0,0.07);
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 36px;
      flex: 1;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 32px;
      flex: 1;
      justify-content: flex-end;
    }

    .nav-link {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 400;
      color: rgba(0,0,0,0.5);
      text-decoration: none;
      letter-spacing: 0.01em;
      transition: color 0.2s ease, font-weight 0.1s ease;
      white-space: nowrap;
    }
    .nav-link:hover {
      color: #b10702;
      font-weight: 700;
    }

    /* Center Logo */
    .nav-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      flex-shrink: 0;
      padding: 0 24px;
    }

    .nav-logo img {
      height: 40px;
      width: auto;
      display: block;
      object-fit: contain;
      image-rendering: crisp-edges;
    }

    /* Connect button */
    .nav-btn {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 400;
      color: rgba(0,0,0,0.5);
      background: none;
      border: none;
      padding: 0;
      letter-spacing: 0.01em;
      transition: color 0.2s ease, font-weight 0.1s ease;
      white-space: nowrap;
    }
    .nav-btn:hover {
      color: #b10702;
      font-weight: 700;
    }

    /* ── Hero ── */
    .scene {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding-left: 6vw;
      padding-top: 64px;
    }

    .typewriter-text {
      font-family: 'Inter', sans-serif;
      font-size: clamp(60px, 13vw, 200px);
      font-weight: 700;
      color: #b10702;
      letter-spacing: -0.03em;
      white-space: nowrap;
      line-height: 1;
    }

    <span class="typewriter-text" id="tw"></span>
  </div>

  <script>
    /* ── Typewriter ── */
    const TOTAL_MS     = 6000;
    const words        = ['Led.', 'Inspired.', 'Delivered.'];
    const TYPE_SPEED   = 55;
    const DELETE_SPEED = 35;
    const PAUSE_BEFORE = 80;
    const el = document.getElementById('tw');
    let wi = 0, ci = 0, deleting = false;

    function pauseAfter(word) {
      const slot = TOTAL_MS / words.length;
      const used = word.length * TYPE_SPEED + word.length * DELETE_SPEED + PAUSE_BEFORE;
      return Math.max(200, slot - used);
    }

    function tick() {
      const word = words[wi];
      if (!deleting) {
        el.textContent = word.slice(0, ++ci);
        if (ci === word.length) { deleting = true; setTimeout(tick, pauseAfter(word)); return; }
        setTimeout(tick, TYPE_SPEED);
      } else {
        el.textContent = word.slice(0, --ci);
        if (ci === 0) { deleting = false; wi = (wi + 1) % words.length; setTimeout(tick, PAUSE_BEFORE); return; }
        setTimeout(tick, DELETE_SPEED);
      }
    }
    tick();
  </script>
